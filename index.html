<!DOCTYPE html>
<html lang="th">

<head>
<meta charset="UTF-8">
<title>Waste Dashboard</title>

<link rel="stylesheet" href="style.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1>Waste Management Dashboard</h1>

<!-- ================= KPI ================= -->
<div class="cards">

<div class="card">
<h3>Total Waste</h3>
<p id="totalLiter">0 L</p>
<small>รวมปริมาณของเสียทั้งหมด</small>
</div>

<div class="card">
<h3>Containers</h3>
<p id="totalContainer">0 ถัง</p>
<small>จำนวนถังทั้งหมด</small>
</div>

<div class="card">
<h3>Records</h3>
<p id="totalRecord">0</p>
<small>จำนวนรายการทั้งหมด</small>
</div>

</div>

<!-- ================= TOP 5 ================= -->
<div id="topBox" style="
margin:20px;
padding:15px;
background:#f5f5f5;
border-radius:10px;
font-size:16px;
"></div>

<!-- ================= FILTER ================= -->
<div style="text-align:center; margin:20px;">

<button onclick="filterData(30)">1 เดือน</button>
<button onclick="filterData(90)">3 เดือน</button>
<button onclick="filterData(180)">6 เดือน</button>
<button onclick="filterData('all')">ทั้งหมด</button>

</div>

<!-- ================= CHARTS ================= -->
<h2 style="margin-top:30px;">Waste Type (ประเภทของเสีย)</h2>
<canvas id="typeChart"></canvas>

<h2 style="margin-top:30px;">Teacher Ranking (ผู้สร้าง Waste)</h2>
<canvas id="teacherChart"></canvas>

<!-- ================= TABLE ================= -->
<h2 style="margin-top:30px;">Waste Data</h2>

<table border="1" width="100%" cellspacing="0" cellpadding="5">

<thead style="background:#eee;">

<tr>
<th>วันที่</th>
<th>อาจารย์</th>
<th>Waste Type</th>
<th>Amount (ถัง)</th>
<th>Container (L/ถัง)</th>
</tr>

</thead>

<tbody id="tableData"></tbody>

</table>

<!-- ================= SCRIPT ================= -->
<script src="app.js"></script>

</body>
</html>
